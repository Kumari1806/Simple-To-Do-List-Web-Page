<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content=""width=device-width, initial-scale="1.0", viewport-fitcover="cover">
    <link rel="stylesheet" href="style.css">                              <!--style.css is added to the html -->
    <title>To-Do List</title>
</head>
<body>
<div class="container">
    <div class="header">To-Do List </div>
    <div class="addTask">                                                 <!--   add task button -->
    <input type="text" placeholder="Add a new task" id="inputTask">       <!--input the value/task to be added in the placeholder -->
    <button onclick="addTask()">Add Task</button>                         <!--task will be added on clicking the Add Task btn -->
    </div>
    <ul class="task-List" id="taskList">                                  <!--multiple tasks are added -->
        
     </ul>
</div>

    <script src="script.js"></script>                                     <!--javascript is added to the html -->
</body>
</html>
